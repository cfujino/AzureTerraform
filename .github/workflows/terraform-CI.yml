name: Terraform-CI

on:
  pull_request:
    branches: ["main"]

  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

defaults:
  run:
    working-directory: terraform

jobs:
  terraform-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      ####################################################################
      # DEBUG
      ####################################################################

      - name: Debug - Working Directory
        run: |
          echo "Current directory:"
          pwd
          echo
          echo "Directory contents:"
          ls -lah

      - name: Debug - Show Terraform Files
        run: |
          echo "========== providers.tf =========="
          cat providers.tf
          echo

          echo "========== versions.tf =========="
          cat versions.tf
          echo

          echo "========== main.tf =========="
          cat main.tf
          echo

          echo "========== keyvault.tf =========="
          cat keyvault.tf
          echo

          echo "========== storage.tf =========="
          cat storage.tf
          echo

          echo "========== functions.tf =========="
          cat functions.tf
          echo

      - name: Terraform Version
        run: terraform version

      ####################################################################

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      ####################################################################
      # MORE DEBUG
      ####################################################################

      - name: Terraform Providers
        run: terraform providers

      - name: Terraform Providers Schema
        run: terraform providers schema -json > providers.json

      - name: List .terraform Directory
        run: |
          echo "========== .terraform =========="
          find .terraform

      - name: Show Terraform Lock File
        run: |
          if [ -f .terraform.lock.hcl ]; then
            cat .terraform.lock.hcl
          else
            echo "No lock file"
          fi

      - name: Validate
        run: terraform validate

      ####################################################################

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: |
          tflint --init
          tflint

      - name: Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan
